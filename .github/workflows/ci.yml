name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Glyph SDK import boundary
        # com.nothing.ketchum (the closed, third-party Glyph Matrix SDK) must stay confined to
        # glyph/, per adr/DRAFT-glyph-matrix-sdk-dependency.md. This is the enforcement side of
        # that ADR's isolation claim - not just an assertion in a doc.
        run: |
          offending=$(grep -rl "import com\.nothing\.ketchum" app/src/main/java --include="*.kt" | grep -v "/glyph/" || true)
          if [ -n "$offending" ]; then
            echo "com.nothing.ketchum must only be imported under app/src/main/java/.../glyph/ - found it in:"
            echo "$offending"
            exit 1
          fi

      - name: ADR draft vocabulary lint
        # Pre-ratification ADRs (adr/DRAFT-*.md) are squashed and rewritten in place as
        # understanding changes - per adr/README.md and governance/qm's decision-record-discipline
        # record, they must never carry revision-history language about themselves. This is the
        # enforcement side of that rule (already violated once in this repo - see the squashed
        # Amendment in adr/DRAFT-midi-clock-as-open-standard-seam.md's history).
        run: |
          offending=$(grep -lEi "previously|originally|earlier draft|re-review|renumber|retroactive|supersedes the .* (stance|finding)|\bcorrected\b" adr/DRAFT-*.md 2>/dev/null || true)
          if [ -n "$offending" ]; then
            echo "Pre-ratification ADRs must be squashed, not narrate their own revision history - found banned vocabulary in:"
            echo "$offending"
            exit 1
          fi

      - name: Build and test
        run: ./gradlew assembleDebug testDebugUnitTest --console=plain
